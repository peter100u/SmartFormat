name: mova
description: Mova mobile media converter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.1
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  file_picker: ^12.0.0-beta.7
  photo_manager: ^3.7.1
  permission_handler: ^12.0.1
  share_plus: ^13.2.0
  open_file: ^4.0.0
  extended_image: ^10.0.1
  path: ^1.9.1
  mime: ^2.0.0
  uuid: ^4.5.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  package_info_plus: ^10.2.0
  device_info_plus: ^13.2.0
  collection: ^1.19.1
  logger: ^2.6.2
  ffmpeg_kit_extended_flutter: 0.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.7.2
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

ffmpeg_kit_extended_config:
  type: "full"
  gpl: false
  small: true
